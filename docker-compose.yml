version: '3.8'

services:
  # MySQL 数据库（独立部署）
  mysql:
    image: mysql:8.0
    container_name: bookkeeping-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 
      MYSQL_DATABASE: bookkeeping
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    command:
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci

  # Spring Boot 后端
  backend:
    build: .
    container_name: bookkeeping-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://:3306/bookkeeping?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 
      SPRING_JPA_PROPERTIES_HIBERNATE_DDL_AUTO: none
      TZ: Asia/Shanghai
    depends_on:
      - mysql

volumes:
  mysql_data:
