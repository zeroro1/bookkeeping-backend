name: Deploy to Production

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'Dockerfile'
      - 'pom.xml'
      - 'docker-compose.prod.yml'

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/bookkeeping-backend:latest

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          script: |
            echo "=== Deploy Start ==="
            mkdir -p /opt/bookkeeping
            cd /opt/bookkeeping

            # Login Docker Hub
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            # Pull latest image
            echo "Pulling image..."
            docker pull "${{ secrets.DOCKER_USERNAME }}/bookkeeping-backend:latest"

            # Stop old container
            docker stop bookkeeping-backend 2>/dev/null || true
            docker rm bookkeeping-backend 2>/dev/null || true
            echo "Old container cleaned"

            # Set environment variables from secrets
            export MYSQL_HOST=${{ secrets.MYSQL_CONTAINER_NAME }}
            export MYSQL_USER=root
            export MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}

            # Create .env file with Spring Boot compatible variable names
            cat > .env << ENVEOF
            SPRING_DATASOURCE_URL=jdbc:mysql://$MYSQL_HOST:3306/bookkeeping?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8&allowPublicKeyRetrieval=true
            SPRING_DATASOURCE_USERNAME=$MYSQL_USER
            SPRING_DATASOURCE_PASSWORD=$MYSQL_PASSWORD
            TZ=Asia/Shanghai
            ENVEOF

            echo "Created .env:"
            cat .env

            # Run new container with environment variables
            docker run -d \
              --name bookkeeping-backend \
              --restart always \
              -p 8080:8080 \
              --env-file /opt/bookkeeping/.env \
              "${{ secrets.DOCKER_USERNAME }}/bookkeeping-backend:latest"

            echo "Container started"
            docker image prune -f

            echo ""
            echo "=== Container Status ==="
            docker ps --filter name=bookkeeping-backend

            echo ""
            echo "=== Latest Logs ==="
            docker logs --tail 30 bookkeeping-backend

            echo ""
            echo "=== Deploy Complete ==="
